name: Deploy Web to Homelab

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Conectar a Tailscale
        uses: tailscale/github-action@v3
        with:
          client-id: ${{ secrets.TS_CLIENT_ID }}
          client-secret: ${{ secrets.TS_CLIENT_SECRET }}

      - name: Desplegar archivos por rsync
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          SOURCE: "./" 
          TARGET: "/home/${{ secrets.SERVER_USER }}/Homelab/mimi-web/src" # Tu ruta en el i3
          ARGS: "-rlgoDzvO --delete --exclude=.git*"
